<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 48" fill="none">
  <!-- CW badge -->
  <rect x="0" y="2" width="44" height="44" rx="8" fill="#E30019"/>
  <!-- CW monogram -->
  <text x="22" y="31" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="18" fill="white">CW</text>
  <!-- Yellow accent bar in badge -->
  <rect x="10" y="37" width="24" height="2.5" rx="1.25" fill="#FFEE00"/>
  <!-- CHEMIST WAREHOUSE text -->
  <text x="54" y="19" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#E30019" letter-spacing="1.5">CHEMIST</text>
  <text x="54" y="37" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#E30019" letter-spacing="1.5">WAREHOUSE</text>
  <!-- Yellow accent underline -->
  <rect x="54" y="42" width="130" height="2.5" rx="1.25" fill="#FFEE00"/>
</svg>
